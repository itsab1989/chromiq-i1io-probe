name: Build probe bundles

# Produces ready-to-run binaries (no Python needed) for Windows, Linux, and both
# Intel and Apple-Silicon macs. Push a version tag (e.g. v1.1.0) to build them
# and publish a GitHub Release with all of them attached. workflow_dispatch just
# builds them as downloadable run artifacts for testing.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.asset }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            asset: chromiq-io-probe-linux
            universal: false
          - os: windows-latest
            asset: chromiq-io-probe-windows.exe
            universal: false
          # One fat binary that runs on both Intel and Apple-Silicon macs.
          - os: macos-14
            asset: chromiq-io-probe-macos
            universal: true
    steps:
      - uses: actions/checkout@v4

      # Linux / Windows: a normal single-arch Python is fine.
      - uses: actions/setup-python@v5
        if: matrix.universal == false
        with:
          python-version: "3.12"

      # macOS: use the python.org universal2 build so PyInstaller can emit a
      # universal2 (x86_64 + arm64) binary — the same approach ChromIQ uses.
      # This script is pure standard library, so there are no third-party
      # wheels to fatten; --target-arch universal2 is all that's needed.
      - name: Set up universal2 Python (macOS)
        if: matrix.universal == true
        run: |
          curl -fsSL -o /tmp/python.pkg \
            "https://www.python.org/ftp/python/3.12.7/python-3.12.7-macos11.pkg"
          sudo installer -pkg /tmp/python.pkg -target /
          echo "/Library/Frameworks/Python.framework/Versions/3.12/bin" >> "$GITHUB_PATH"

      - name: Install PyInstaller
        run: python3 -m pip install --upgrade pip pyinstaller

      - name: Build one-file executable
        shell: bash
        run: |
          if [ "${{ matrix.universal }}" = "true" ]; then
            pyinstaller --onefile --target-arch universal2 --name probe chromiq_io_probe.py
          else
            pyinstaller --onefile --name probe chromiq_io_probe.py
          fi

      - name: Name the artifact
        shell: bash
        run: |
          mkdir -p out
          if [ "${{ runner.os }}" = "Windows" ]; then
            mv dist/probe.exe "out/${{ matrix.asset }}"
          else
            mv dist/probe "out/${{ matrix.asset }}"
            chmod +x "out/${{ matrix.asset }}"
          fi

      - name: Verify it really is universal2 (macOS)
        if: matrix.universal == true
        run: |
          lipo -info "out/${{ matrix.asset }}"
          lipo -info "out/${{ matrix.asset }}" | grep -q "x86_64 arm64" \
            || { echo "FAIL: binary is not universal2"; exit 1; }

      - name: Smoke-test the binary (must run and exit 0)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          # With no device and stdin closed it must still produce a report and
          # exit cleanly. A binary that crashes here is not shippable.
          # The report is written next to the executable (i.e. in out/).
          "./out/${{ matrix.asset }}" --skip-annotate < /dev/null
          if ls out/chromiq-io-probe-*.txt >/dev/null 2>&1; then
            echo "report written OK"
          else
            echo "FAIL: no report produced"; exit 1
          fi

      - name: Smoke-test the binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $null | & ".\out\${{ matrix.asset }}" --skip-annotate
          if (Get-ChildItem "out\chromiq-io-probe-*.txt" -ErrorAction SilentlyContinue) {
            Write-Host "report written OK"
          } else {
            Write-Error "no report produced"; exit 1
          }

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: out/${{ matrix.asset }}

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Also bundle the readable scripts (for people who prefer source)
        run: |
          pack="chromiq-i1io-probe-scripts"
          mkdir -p "$pack"
          cp chromiq_io_probe.py "READ ME FIRST.txt" README.md \
             Start-macOS.command Start-Linux.sh Start-Windows.bat "$pack/"
          zip -r "artifacts/${pack}.zip" "$pack"
          ls -la artifacts

      - name: Publish
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          body: |
            Ready-to-run builds of the ChromIQ i1iO information collector.

            **Just want to run it?** Download the file for your system:

            | System | File |
            |--------|------|
            | Windows | `chromiq-io-probe-windows.exe` |
            | macOS (Intel **and** Apple Silicon) | `chromiq-io-probe-macos` |
            | Linux | `chromiq-io-probe-linux` |

            No Python needed. It only **reads** information about connected
            hardware — it never sends anything to the table and cannot move the
            arm. See the README for what it collects and how to get past the
            "unidentified developer" warning (these builds are not code-signed).

            Prefer to read the source before running? Grab
            `chromiq-i1io-probe-scripts.zip` instead.
